<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vision® — Secure Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Background grid effect */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image:
                linear-gradient(rgba(0, 255, 200, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 200, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        /* Subtle scan line effect */
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.15) 2px,
                rgba(0, 0, 0, 0.15) 4px
            );
            pointer-events: none;
            z-index: 1;
        }

        .login-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 480px;
            padding: 0 20px;
        }

        .login-container {
            background: linear-gradient(180deg, #0d1117 0%, #0a0e14 100%);
            border: 1px solid rgba(0, 255, 200, 0.15);
            border-top: 2px solid rgba(0, 255, 200, 0.5);
            border-radius: 4px;
            padding: 40px 40px 32px;
            text-align: center;
            position: relative;
            box-shadow:
                0 0 40px rgba(0, 255, 200, 0.05),
                inset 0 0 60px rgba(0, 0, 0, 0.5);
        }

        /* Corner accents */
        .login-container::before,
        .login-container::after {
            content: '';
            position: absolute;
            width: 20px; height: 20px;
            border-color: rgba(0, 255, 200, 0.3);
            border-style: solid;
        }
        .login-container::before {
            top: -1px; left: -1px;
            border-width: 2px 0 0 2px;
        }
        .login-container::after {
            bottom: -1px; right: -1px;
            border-width: 0 2px 2px 0;
        }

        .security-badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 2px;
            color: rgba(0, 255, 200, 0.7);
            text-transform: uppercase;
            margin-bottom: 16px;
        }
        .security-badge .dot {
            display: inline-block;
            width: 6px; height: 6px;
            background: #00ffc8;
            border-radius: 50%;
            margin: 0 6px;
            vertical-align: middle;
            box-shadow: 0 0 8px rgba(0, 255, 200, 0.6);
            animation: pulse-dot 2s infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .main-title {
            font-family: 'Inter', sans-serif;
            font-size: 26px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .subtitle {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: #6b7280;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        .shield-icon {
            width: 52px; height: 52px;
            margin: 0 auto 28px;
            background: rgba(0, 255, 200, 0.08);
            border: 1.5px solid rgba(0, 255, 200, 0.3);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 25px rgba(0, 255, 200, 0.1);
        }
        .shield-icon svg {
            width: 26px; height: 26px;
            color: #00ffc8;
        }

        .input-group {
            text-align: left;
            margin-bottom: 18px;
        }
        .input-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            font-weight: 600;
            color: #6b7280;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 8px;
            display: block;
        }
        .input-wrapper {
            position: relative;
        }
        .input-wrapper svg {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px; height: 16px;
            color: #4b5563;
        }
        .input-wrapper input {
            width: 100%;
            padding: 12px 14px 12px 42px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 4px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }
        .input-wrapper input::placeholder {
            color: #4b5563;
            font-size: 13px;
        }
        .input-wrapper input:focus {
            border-color: rgba(0, 255, 200, 0.4);
            background: rgba(0, 255, 200, 0.03);
            box-shadow: 0 0 15px rgba(0, 255, 200, 0.08);
        }

        .login-btn {
            width: 100%;
            padding: 13px;
            background: #e5e7eb;
            color: #111;
            border: none;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 6px;
        }
        .login-btn:hover {
            background: #fff;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.15);
        }
        .login-btn svg {
            width: 16px; height: 16px;
            animation: spin 3s linear infinite;
        }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .footer-info {
            margin-top: 28px;
        }
        .powered-by {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: rgba(0, 255, 200, 0.5);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        .powered-by .dot {
            display: inline-block;
            width: 6px; height: 6px;
            background: #00ffc8;
            border-radius: 50%;
            margin-right: 6px;
            vertical-align: middle;
            box-shadow: 0 0 6px rgba(0, 255, 200, 0.5);
        }
        .encryption-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            color: #374151;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        /* Bottom status bar */
        .status-bar {
            position: relative;
            z-index: 10;
            margin-top: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: #374151;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .status-dot {
            width: 5px; height: 5px;
            background: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 6px rgba(34, 197, 94, 0.5);
        }
        .status-sep {
            width: 1px; height: 12px;
            background: #1f2937;
        }

        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
            padding: 10px;
            border-radius: 4px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-container">
            <div class="security-badge">
                <span class="dot"></span> Vision® Security Active <span class="dot"></span>
            </div>

            <h1 class="main-title">Annual Examination</h1>
            <p class="subtitle">Identity Verification Required</p>

            <div class="shield-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/>
                    <path d="m9 12 2 2 4-4"/>
                </svg>
            </div>

            <div class="error-msg" id="errorMsg">Invalid credentials. Access denied.</div>

            <form action="/login" method="POST" id="loginForm">
                <div class="input-group">
                    <label class="input-label">Username</label>
                    <div class="input-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
                        <input type="text" name="username" required placeholder="Enter your username">
                    </div>
                </div>

                <div class="input-group">
                    <label class="input-label">Password</label>
                    <div class="input-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        <input type="password" name="password" required placeholder="Enter your password">
                    </div>
                </div>

                <button type="submit" class="login-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                    Initiate Secure Login
                </button>
            </form>

            <div class="footer-info">
                <div class="powered-by"><span class="dot"></span> Powered by Vision®</div>
                <div class="encryption-text">End-to-end encryption active · No cheating detected</div>
            </div>
        </div>

        <div class="status-bar">
            <div class="status-item"><span class="status-dot"></span> TLS 1.3</div>
            <div class="status-sep"></div>
            <div class="status-item"><span class="status-dot"></span> 256 BIT AES</div>
            <div class="status-sep"></div>
            <div class="status-item"><span class="status-dot"></span> Protected</div>
        </div>
    </div>
</body>
</html>
